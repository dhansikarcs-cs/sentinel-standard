name: Run Cryptographic & NLP Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install cryptography jsonschema
      - name: Run Core Test Suite
        run: |
          PYTHONPATH=. python -m unittest tests/test_cryptography.py tests/test_nlp_pipeline.py
